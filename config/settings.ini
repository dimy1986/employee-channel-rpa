[general]
app_name = EmployeeChannelRPA
version = 1.0.0
log_level = INFO

[ui_automation]
retry_max_attempts = 3
default_timeout = 30
screenshot_on_error = true

[export]
export_base_path = D:\RPA_Exports
download_monitor_timeout = 30

[notification]
enable_system_toast = true
enable_email = false

[browser]
browser_detection_timeout = 10
selenium_wait_timeout = 15
